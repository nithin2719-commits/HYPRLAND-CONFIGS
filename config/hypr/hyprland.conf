env = WLR_DRM_DEVICES,/dev/dri/card0
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
misc {
    vrr = 1
}


bind = SUPER, X, exec, /home/nithin/chatgpt.sh
bind = SUPER, RETURN, exec, notify-send "WHY ARE YOU GAY"
exec-once = ~/.config/hypr/rgb-border.sh
animations {
    enabled = yes
    bezier = linear, 1, 1, 1, 1
    animation = borderangle, 2, 8, linear, loop
}

general {
    col.active_border = rgb(ff0000) rgb(ff7f00) rgb(ffff00) rgb(00ff00) rgb(0000ff) rgb(4b0082) rgb(8f00ff) rgb(ff0000) 90deg
    border_size = 4
}
$scrPath = $HOME/.local/share/bin # set scripts path


# █▀▄▀█ █▀█ █▄░█ █ ▀█▀ █▀█ █▀█
# █░▀░█ █▄█ █░▀█ █ ░█░ █▄█ █▀▄

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,2560x1440@240,0x0,1.5


# █░░ ▄▀█ █░█ █▄░█ █▀▀ █░█
# █▄▄ █▀█ █▄█ █░▀█ █▄▄ █▀█

# See https://wiki.hyprland.org/Configuring/Keywords/
exec-once = swww init
exec-once = sleep 1 && swww img ~/Pictures/wallpaper.jpg 
exec-once = ~/.config/hypr/rgb.sh
exec-once = $scrPath/resetxdgportal.sh # reset XDPH for screenshare
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = dbus-update-activation-environment --systemd --all # for XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = $scrPath/polkitkdeauth.sh # authentication dialogue for GUI apps
exec-once = blueman-applet # systray app for Bluetooth
exec-once = udiskie --no-automount --smart-tray # front-end that allows to manage removable media
exec-once = nm-applet --indicator # systray app for Network/Wifi
exec-once = swaync # start notification demon
exec-once = wl-paste --type text --watch cliphist store # clipboard store text data
exec-once = wl-paste --type image --watch cliphist store # clipboard store image data
exec-once = $scrPath/batterynotify.sh # battery notification
exec-once = $scrPath/wbarconfgen.sh


# █▀▀ █▄░█ █░█
# ██▄ █░▀█ ▀▄▀

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = QT_SCALE_FACTOR,1.2
env = GDK_SCALE,1
env = PATH,$PATH:$scrPath
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1


# █ █▄░█ █▀█ █░█ ▀█▀
# █ █░▀█ █▀▀ █▄█ ░█░

# See https://wiki.hyprland.org/Configuring/Variables/

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }
natural_scroll = false
    sensitivity = 0
    force_no_accel = 1
    numlock_by_default = true
}

# See https://wiki.hyprland.org/Configuring/Keywords/#executing

device {
    name = epic mouse V1
    sensitivity = -0.5
}

# See https://wiki.hyprland.org/Configuring/Variables/



# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/

dwindle {
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/

master {
}


# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄

# See https://wiki.hyprland.org/Configuring/Variables/




# █▀ █▀█ █░█ █▀█ █▀▀ █▀▀
# ▄█ █▄█ █▄█ █▀▄ █▄▄ ██▄

source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/themes/common.conf # shared theme settings
# hyprlang noerror true
source = ~/.config/hypr/themes/theme.conf # theme specific settings
# hyprlang noerror false
source = ~/.config/hypr/themes/colors.conf # wallbash color override
source = ~/.config/hypr/monitors.conf # initially empty, to be configured by user and remains static
source = ~/.config/hypr/userprefs.conf # initially empty, to be configured by user and remains static

# Note: as userprefs.conf is sourced at the end, settings configured in this file will override the defaults
source = ~/.config/hypr/nvidia.conf # auto sourced vars for nvidia



bind = , XF86Launch1, exec, bash ~/.config/waybar/scripts/powerprofile_toggle.sh
bind = SUPER, Escape, exec, logoutlaunch.sh
bind = , F2, exec, brightnessctl -d asus::kbd_backlight set 0%
bind = , F3, exec, brightnessctl -d asus::kbd_backlight set 100%
# App Keybinds
bind = SUPER, y, exec, firefox https://youtube.com
bind = SUPER, w, exec, firefox https://web.whatsapp.com


# Fix fullscreen - change H to F
bind = SUPER, S, fullscreen, 0
# Remove or comment out your old SUPER H fullscreen bind

# Switch windows (alt+tab)
bind = ALT, Tab, exec, hyprswitch gui --mod-key alt --key Tab --show-title
bind = ALT SHIFT, Tab, exec, hyprswitch gui --mod-key alt --key Tab --reverse --show-title


# Minimize/Maximize with SUPER M


$key = tab
$mod = alt
$reverse = grave


# Close ALL windows with SUPER T
bind = ALT, Tab, exec, ~/.config/hypr/scripts/alt-tab.sh
bind = ALT SHIFT, Tab, exec, ~/.config/hypr/scripts/alt-tab.sh --reverse
bind = , F11, fullscreen
# ===============================
# 🔥 CLEAN KEYBINDS (FINAL)
# ===============================

# ✅ Chrome (main launcher)
bindr = $mainMod, C, exec, google-chrome-stable --new-window

# ===============================
# 🚀 APP SHORTCUTS (ALT)
# ===============================

bind = ALT_L, Z, exec, google-chrome-stable --app=https://youtube.com
bind = ALT_L, X, exec, google-chrome-stable --app=https://web.whatsapp.com
bind = ALT_L, Q, exec, google-chrome-stable --app=https://claude.ai
bind = ALT_L, V, exec, google-chrome-stable --app=https://chat.openai.com

# ===============================
# 🪟 WINDOW CONTROLS
# ===============================

bind = ALT_L, ESCAPE, exec, hyprctl dispatch killactive
bind = ALT_L, D, exec, hyprctl dispatch fullscreen 1
bind = ALT_L, F, exec, bash ~/.local/share/bin/showdesktop.sh

# ===============================
# 🧪 TEST (optional)
# ===============================

bind = $mainMod, Z, exec, notify-send "FUCK YOUUUUUUUUUUUUUUUUUU"

# Gestures

# 4 finger app gestures
bind = , mouse:277, exec, /home/nithin/.local/share/bin/gesture.sh youtube

exec-once = /home/nithin/.local/share/bin/start-gestures.sh

#resolution
xwayland {
    force_zero_scaling = true
}
