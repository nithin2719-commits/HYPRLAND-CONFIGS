source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/themes/common.conf # shared theme settings
# hyprlang noerror true
source = ~/.config/hypr/themes/theme.conf # theme specific settings
# hyprlang noerror false
source = ~/.config/hypr/themes/colors.conf # wallbash color override
source = ~/.config/hypr/monitors.conf # initially empty, to be configured by user and remains static
source = ~/.config/hypr/userprefs.conf # initially empty, to be configured by user and remains static

# Note: as userprefs.conf is sourced at the end, settings configured in this file will override the defaults
source = ~/.config/hypr/nvidia.conf # auto sourced vars for nvidia

bind = , XF86Launch1, exec, bash ~/.config/waybar/scripts/powerprofile_toggle.sh
bind = SUPER, Escape, exec, logoutlaunch.sh
bind = , F2, exec, brightnessctl -d asus::kbd_backlight set 0%
bind = , F3, exec, brightnessctl -d asus::kbd_backlight set 100%
# App Keybinds
bind = SUPER, y, exec, firefox https://youtube.com
bind = SUPER, w, exec, firefox https://web.whatsapp.com
# Fix fullscreen - change H to F
bind = SUPER, S, fullscreen, 0
# Remove or comment out your old SUPER H fullscreen bind

# Switch windows (alt+tab)
bind = ALT, Tab, exec, hyprswitch gui --mod-key alt --key Tab --show-title
bind = ALT SHIFT, Tab, exec, hyprswitch gui --mod-key alt --key Tab --reverse --show-title
# Minimize/Maximize with SUPER M
$key = tab
$mod = alt
$reverse = grave
# Close ALL windows with SUPER T
bind = ALT, Tab, exec, ~/.config/hypr/scripts/alt-tab.sh
bind = ALT SHIFT, Tab, exec, ~/.config/hypr/scripts/alt-tab.sh --reverse
bind = , F11, fullscreen
# ===============================
