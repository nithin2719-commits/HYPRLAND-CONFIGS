background {
    monitor =
    path = /home/nithin/Pictures/Wallpapers/chainsaw.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 0.6
}

input-field {
    monitor =
    size = 350, 55
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(7aa2f7ff)
    inner_color = rgba(1a1b26ee)
    font_color = rgba(c0caf5ff)
    fade_on_empty = true
    placeholder_text = <i>  Enter Password</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    rounding = 15
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(c0caf5ff)
    font_size = 100
    font_family = JetBrains Mono Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(7aa2f7ff)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 100
    halign = center
    valign = center
}

